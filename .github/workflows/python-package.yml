# Lint, type-check, test, and build scidoggo across supported Python versions.
# See: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + test + lint)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" ruff mypy
      - name: Ruff lint
        run: ruff check scidoggo
      - name: Ruff format check
        run: ruff format --check scidoggo
      - name: Mypy (core)
        run: mypy scidoggo
      - name: Pytest (core only)
        run: pytest -m "not circuits and not deep and not neural and not sparse"

  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (all extras + test)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,test]"
      - name: Pytest (full suite)
        run: pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
